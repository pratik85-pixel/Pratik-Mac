# alembic.ini — ZenFlow Verity

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# Timezone for revision file generation
timezone = UTC

# Max length of migration filename slug
truncate_slug_length = 40

# sqlalchemy.url is intentionally left empty here.
# env.py loads it from Settings.DATABASE_SYNC_URL so .env overrides work.
sqlalchemy.url =

# Allow Alembic to detect type changes (e.g. String(20) → String(40))
compare_type = true

[post_write_hooks]
# Uncomment to auto-format new migration files with black:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
